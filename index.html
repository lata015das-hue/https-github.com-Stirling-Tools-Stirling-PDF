<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stirling PDF - Free Tools</title>

    <!--
      Perf: warm up the backend origin. We no longer load Tailwind from a CDN
      (see reports/perf-audit.md, R-1) so the only cross-origin host is the
      Stirling-PDF backend. The dns-prefetch is a no-op for localhost; it kicks
      in once the backend is on a real host.
    -->
    <link rel="dns-prefetch" href="http://localhost:8080">

    <!--
      Tailwind is now precompiled. Run `npm install` once, then either:
         npm run build:css   (one-shot, minified)
         npm run watch:css   (rebuilds while you edit class strings)
      The output goes to /dist/tailwind.css. See README.md "Build" section.
    -->
    <link rel="stylesheet" href="dist/tailwind.css">

    <style>
      /*
        Critical CSS for the "Tailwind not built yet" state. If `dist/tailwind.css`
        is missing or empty, the helper script below replaces the page body with
        a useful message instead of an unstyled wall of HTML.
      */
      .perf-r1-fallback {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 640px;
        margin: 4rem auto;
        padding: 1.5rem;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        line-height: 1.5;
      }
      .perf-r1-fallback code { background: #f3f4f6; padding: 0.1rem 0.35rem; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app"></div>

    <!--
      One-shot guard: if Tailwind's reset isn't present (because dist/tailwind.css
      wasn't built or wasn't found), tell the developer how to fix it instead of
      silently rendering a broken page. Cheap inline check, no network.
    -->
    <script>
      (function () {
        var probe = document.createElement('div');
        probe.className = 'hidden';
        document.body.appendChild(probe);
        var hidden = getComputedStyle(probe).display === 'none';
        document.body.removeChild(probe);
        if (!hidden) {
          document.getElementById('app').innerHTML =
            '<div class="perf-r1-fallback">' +
              '<h1>Stirling-PDF frontend: stylesheet not built</h1>' +
              '<p><code>dist/tailwind.css</code> is missing or empty. ' +
              'Run the one-time build:</p>' +
              '<pre><code>npm install\nnpm run build:css</code></pre>' +
              '<p>Then reload this page.</p>' +
              '<p style="color:#6b7280;font-size:0.85rem">' +
                'Why: this project moved off the Tailwind CDN to a precompiled CSS ' +
                'file. See <code>reports/perf-audit.md</code>, recommendation R-1.' +
              '</p>' +
            '</div>';
        }
      })();
    </script>

    <!--
      Perf: defer parses-and-executes after the document is parsed, in order.
      Order is preserved (tools-data.js -> api.js -> router.js -> components.js -> app.js)
      because globals are referenced across files (e.g. BACKEND_URL, TOOLS, router).
    -->
    <script defer src="js/tools-data.js"></script>
    <script defer src="js/api.js"></script>
    <script defer src="js/router.js"></script>
    <script defer src="js/components.js"></script>
    <script defer src="js/app.js"></script>
</body>
</html>
